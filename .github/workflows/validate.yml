name: Validate Scaffold

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax checks
        run: |
          find scripts ollama/scripts -type f -name "*.sh" -print0 | xargs -0 -I{} bash -n {}

      - name: JSON checks
        run: |
          find n8n/workflows -type f -name "*.json" -print0 | xargs -0 -I{} python3 -m json.tool {} >/dev/null

      - name: YAML tab check
        run: scripts/validate/validate-yaml.sh
